name: Relatorio Diario 22h

on:
  schedule:
    # 21:00 UTC = 22:00 Lisboa (horário de verão WEST, UTC+1)
    # Em inverno (UTC+0) alterar para '0 22 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:  # Permite correr manualmente para testar

jobs:
  relatorio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Correr relatorio diario
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python relatorio_diario.py
