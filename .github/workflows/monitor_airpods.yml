name: Monitor AirPods

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Restaurar historico
        uses: actions/cache@v4
        with:
          path: historico_airpods.json
          key: historico-airpods-${{ github.run_id }}
          restore-keys: |
            historico-airpods-
      - name: Correr monitor AirPods
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_airpods.py
      - name: Guardar historico
        uses: actions/cache/save@v4
        if: always()
        with:
          path: historico_airpods.json
          key: historico-airpods-${{ github.run_id }}
