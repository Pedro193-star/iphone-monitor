name: Monitor iPhones OLX

on:
  schedule:
    - cron: '*/2 * * * *'   # Corre a cada 2 minutos
  workflow_dispatch:          # Permite correr manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Restaurar historico
        uses: actions/cache@v4
        with:
          path: historico.json
          key: historico-${{ github.run_id }}
          restore-keys: |
            historico-

      - name: Correr o monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_iphone_smart.py

      - name: Guardar historico
        uses: actions/cache/save@v4
        if: always()
        with:
          path: historico.json
          key: historico-${{ github.run_id }}
